<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact ❅ BLACKSNOW</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <script src="loader.js"></script>
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; }
        section { flex: 1; }
    </style>
</head>
<body class="scanlines">
    <div class="snowflake">❅</div>
    <div class="snowflake">❆</div>
    <div class="snowflake">❅</div>
    <div class="snowflake">❆</div>
    <div class="snowflake">❅</div>
    <div class="snowflake">❆</div>

    <!-- Mobile Menu -->
    <div id="mobileMenu" class="mobile-menu">
        <button class="absolute top-6 right-6 text-3xl" id="closeMenu">
            <span class="material-icons" style="font-size:2rem;">close</span>
        </button>
        <div class="flex flex-col items-center space-y-8 text-2xl">
            <a href="index.html" class="text-white transition duration-300">ACCUEIL</a>
            <a href="membres.html" class="text-white transition duration-300">MEMBRES</a>
            <a href="news.html" class="text-white transition duration-300">ACTUALITÉS</a>
            <a href="videos.html" class="text-white transition duration-300">VIDEOS</a>
            <a href="contact.html" class="text-white transition duration-300">CONTACT</a>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="fixed w-full z-50 bg-black bg-opacity-90 backdrop-blur-md border-b-2">
        <div class="container mx-auto px-6 py-3">
            <div class="flex justify-between items-center">
                <a href="index.html"><img src="logo.svg" class="logo-header" alt="logo"></a>
                <div class="hidden md:flex items-center space-x-8">
                    <a href="index.html" class="text-white hover:neon-text-pink transition duration-300">ACCUEIL</a>
                    <a href="membres.html" class="text-white hover transition duration-300">MEMBRES</a>
                    <a href="news.html" class="text-white hover:neon-text-pink transition duration-300">ACTUALITÉS</a>
                    <a href="videos.html" class="text-white hover:neon-text-pink transition duration-300">VIDEOS</a>
                    <a href="contact.html" class="px-4 py-2 bg-black border-2 font-bold hover:border-neon-blue hover:text-neon-blue transition duration-300">CONTACT</a>
                </div>
                <button id="openMenu" class="md:hidden flex items-center justify-center text-white">
                    <span class="material-icons" style="font-size:2rem;">menu</span>
                </button>
            </div>
        </div>
    </nav>

    <section class="py-20 bg-black y2k-grid-bg border-t-2">
        <div id="event-register" class="mt-16 max-w-2xl mx-auto form p-8 rounded-lg border-2">
            <h3 class="text-3xl font-bold mb-6 text-center">CONTACTEZ-NOUS</h3>
            <form action="https://formspree.io/f/mwplyjzj" method="POST" id="contact-form" class="space-y-4">
                <div>
                    <label for="event-name" class="block text-neon-blue mb-2">OBJET</label>
                    <select id="event-name" name="subject" class="w-full px-4 py-3 bg-gray-900 border-2 border-neon-blue rounded-lg focus:outline-none text-white">
                        <option value="">[Aucun objet]</option>
                        <option value="intégrer le groupe">Intégrer le groupe</option>
                        <option value="participation à un evenement">Demande de participation à un événement</option>
                    </select>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="first-name" class="block text-neon-pink mb-2">PRÉNOM</label>
                        <input type="text" name="first-name" id="first-name" class="w-full px-4 py-3 bg-gray-900 border-2 rounded-lg focus:outline-none focus:border-neon-blue text-white" required>
                    </div>
                    <div>
                        <label for="last-name" class="block text-neon-blue mb-2">NOM</label>
                        <input type="text" name="last-name" id="last-name" class="w-full px-4 py-3 bg-gray-900 border-2 border-neon-blue rounded-lg focus:outline-none text-white">
                    </div>
                </div>
                <div>
                    <label for="event-email" class="block text-neon-green mb-2">EMAIL</label>
                    <input type="email" name="email" id="event-email" class="w-full px-4 py-3 bg-gray-900 border-2 rounded-lg focus:outline-none text-white" required>
                </div>
                <div>
                    <label for="event-phone" class="block text-neon-yellow mb-2">TÉLÉPHONE</label>
                    <input type="tel" name="tel" id="event-phone" class="w-full px-4 py-3 bg-gray-900 border-2 rounded-lg focus:outline-none focus:border-neon-blue text-white">
                </div>
                <div>
                    <label for="event-notes" class="block mb-2">MESSAGE</label>
                    <textarea id="event-notes" name="message" rows="3" class="w-full px-4 py-3 bg-gray-900 border-2 rounded-lg focus:outline-none text-white" required></textarea>
                </div>
                <div class="pt-4">
                    <button type="submit" class="w-full px-6 py-3 bg-black border-2 font-bold hover:border-neon-pink transition duration-300">
                        ENVOYER
                    </button>
                </div>
            </form>
        </div>
    </section>

    <footer class="footer">
        <div class="footer-left">
          <p>© 2025 BLACKSNOW. Tous droits réservés</p>
          <p><a href="cgu.html">Mentions légales</a> · <a href="contact.html">Contact</a></p>
        </div>
        <div class="footer-right flex space-x-4 text-2xl">
            <a href="https://www.instagram.com/blacksnow_dancecrew/" target="_blank" class="text-white hover:text-neon-pink transition"><i class="fab fa-instagram"></i></a>
            <a href="https://www.youtube.com/@blacksnow_dancecrew" target="_blank" class="text-white hover:text-neon-yellow transition"><i class="fab fa-youtube"></i></a>
            <a href="https://www.tiktok.com/@blacksnow_dancecrew?_t=8gOKtXCCmDx&_r=1" target="_blank" class="text-white hover:text-neon-blue transition"><i class="fab fa-tiktok"></i></a>
            <a href="https://www.facebook.com/people/Black-Snow/100039859277194/" target="_blank" class="text-white hover:text-neon-blue transition"><i class="fab fa-facebook"></i></a>
        </div>
    </footer>

    <script>
        const openBtn  = document.getElementById('openMenu');
        const closeBtn = document.getElementById('closeMenu');
        const menu     = document.getElementById('mobileMenu');
        openBtn.addEventListener('click', () => { menu.classList.add('active'); document.body.style.overflow = 'hidden'; });
        closeBtn.addEventListener('click', () => { menu.classList.remove('active'); document.body.style.overflow = ''; });
        menu.querySelectorAll('a').forEach(l => l.addEventListener('click', () => { menu.classList.remove('active'); document.body.style.overflow = ''; }));
    </script>
</body>
</html>
